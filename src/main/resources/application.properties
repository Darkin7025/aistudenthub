# ============================================================
# AI — Chatbot Provider
# If AI_API_KEY is empty, backend uses a clear mock fallback.
# ============================================================
# AI CONFIG - GEMINI REAL
ai.provider=gemini
ai.api-key=${GEMINI_API_KEY:your-api-key-here}
ai.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
ai.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.max-tokens=${AI_MAX_TOKENS:1024}
