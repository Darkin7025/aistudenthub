spring.application.name=aistudenthub

# ============================================================
# DATABASE — SQL Server (SQL Authentication)
# Override in application-local.properties (gitignored)
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1444;databaseName=ai_study_hub;trustServerCertificate=true;encrypt=false
spring.datasource.username=${DB_USERNAME:springuser}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:your-secret-key-here}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ============================================================
# MAIL — Gmail SMTP (App Password)
# Override in application-local.properties (gitignored)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App base URL
app.base-url=http://localhost:8080

# ============================================================
# CLOUDINARY — Cloud File Storage
# Override in application-local.properties (gitignored)
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# ============================================================
# FILE UPLOAD — Limits
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Activate local profile in development (override with env var in prod)
spring.profiles.active=local
