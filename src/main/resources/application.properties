spring.application.name=aistudenthub

server.port=8080


# ============================================================
# CORS — Allowed origins (comma-separated)
# Override in application-local.properties or env var for production
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://aistudenthub-fe.vercel.app}

# ============================================================
# ENCODING - Force UTF-8 for Multipart / Vietnamese characters
# ============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true


# ============================================================
# DATABASE — PostgreSQL
# Override in application-local.properties (gitignored)
# ============================================================
spring.datasource.url=jdbc:postgresql://dpg-d8k0v10js32c73e6h480-a.singapore-postgres.render.com:5432/aistudenthub_db
spring.datasource.username=${DB_USERNAME:aistudenthub_db_user}
spring.datasource.password=${DB_PASSWORD:your-db-password}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:YWlzdHVkZW50aHViLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nCg==}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ============================================================
# MAIL — Brevo (Sendinblue) HTTP API
# Free 300 emails/day, no domain verification required
# Set BREVO_API_KEY on Render dashboard
# ============================================================
brevo.api-key=${BREVO_API_KEY:placeholder}
brevo.from-email=${BREVO_FROM_EMAIL:aistudyhub@11547453.brevosend.com}
brevo.from-name=AI Study Hub

# App base URL — must point to FRONTEND, not backend!
# Override with env var APP_BASE_URL on Render
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Reverse Proxy (Render)
server.forward-headers-strategy=framework

# ============================================================
# CLOUDINARY — Cloud File Storage
# Override in application-local.properties (gitignored)
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dvfxosiyy}
