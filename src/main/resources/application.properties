spring.application.name=aistudenthub

server.port=${PORT:8080}


# ============================================================
# CORS — Allowed origins (comma-separated)
# Override in application-local.properties or env var for production
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://aistudenthub-fe.vercel.app}

# ============================================================
# ENCODING - Force UTF-8 for Multipart / Vietnamese characters
# ============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true


# ============================================================
# DATABASE — PostgreSQL
# Override in application-local.properties (gitignored)
# ============================================================
spring.datasource.url=jdbc:postgresql://dpg-d8k0v10js32c73e6h480-a.singapore-postgres.render.com:5432/aistudenthub_db
spring.datasource.username=${DB_USERNAME:aistudenthub_db_user}
spring.datasource.password=${DB_PASSWORD:your-db-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:YWlzdHVkZW50aHViLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nCg==}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ============================================================
# MAIL — Brevo (Sendinblue) HTTP API
# Free 300 emails/day, no domain verification required
# Set BREVO_API_KEY on Render dashboard
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App base URL
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Reverse Proxy (Render)
server.forward-headers-strategy=framework

# ============================================================
# CLOUDINARY — Cloud File Storage
# Override in application-local.properties (gitignored)
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dvfxosiyy}
cloudinary.api-key=${CLOUDINARY_API_KEY:275954543392689}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:NhPo-u8CFib8o95uDVVpEHdMD5c}

# ============================================================
# AI — Chatbot Provider
# If AI_API_KEY is empty, backend uses a clear mock fallback.
# ============================================================
# AI CONFIG - GEMINI REAL
ai.provider=gemini
ai.api-key=${GEMINI_API_KEY:your-gemini-api-key}
ai.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
ai.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.max-tokens=${AI_MAX_TOKENS:8192}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:60}


# ============================================================
# FILE UPLOAD — Limits
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Activate local profile in development — set SPRING_PROFILES_ACTIVE=local in your local IDE run config
# spring.profiles.active=local

# ============================================================
# PAYOS — Payment Gateway Configuration
# ============================================================
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/payment/success}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/payment/cancel}

# ============================================================
# JACKSON — Ignore unknown fields from external APIs (e.g. PayOS)
# ============================================================
spring.jackson.deserialization.fail-on-unknown-properties=false


