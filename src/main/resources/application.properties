spring.application.name=aistudenthub

server.port=8080

# ============================================================
# CORS — Allowed origins (comma-separated)
# Override in application-local.properties or env var for production
# ============================================================
cors.allowed-origins=http://localhost:5173

# ============================================================
# ENCODING - Force UTF-8 for Multipart / Vietnamese characters
# ============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true


# ============================================================
# DATABASE — PostgreSQL
# Override in application-local.properties (gitignored)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_study_hub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:YWlzdHVkZW50aHViLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nCg==}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ============================================================
# MAIL — Gmail SMTP (App Password)
# Override in application-local.properties (gitignored)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App base URL
app.base-url=http://localhost:8080

# ============================================================
# CLOUDINARY — Cloud File Storage
# Override in application-local.properties (gitignored)
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# ============================================================
# AI — Chatbot Provider
# If AI_API_KEY is empty, backend uses a clear mock fallback.
# ============================================================
# AI CONFIG - GEMINI REAL
ai.provider=gemini
ai.api-key=${GEMINI_API_KEY:your-gemini-api-key}
ai.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
ai.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.max-tokens=${AI_MAX_TOKENS:1024}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:30}


# ============================================================
# FILE UPLOAD — Limits
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Activate local profile in development (override with env var in prod)
spring.profiles.active=local
